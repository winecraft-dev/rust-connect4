<!doctype html>
<html>
    <head>
        <script src="scripts/play.js"></script>
        <link rel="stylesheet" href="styles/style.css" />
    </head>
    <body>
        <div class="section">
            <img src="logo.png" class="logo" />
        </div>
        <div class="section">
            <h2>
                Connection:
                <div id="status" class="status"></div>
            </h2>
        </div>
        <div class="section">
            <label for="username">Username: </label>
            <input id="username" type="text" />
            <button id="connect" class="connect-button">Connect</button>
        </div>
        <div class="section">
            <div>
                <h2>Gameplay</h2>
                <textarea rows="10" cols="20" id="gameplay"></textarea>
                <div>
                    <button column="0" class="drop-button" disabled>1</button>
                    <button column="1" class="drop-button" disabled>2</button>
                    <button column="2" class="drop-button" disabled>3</button>
                    <button column="3" class="drop-button" disabled>4</button>
                    <button column="4" class="drop-button" disabled>5</button>
                    <button column="5" class="drop-button" disabled>6</button>
                    <button column="6" class="drop-button" disabled>7</button>
                </div>
            </div>
        </div>
    </body>
</html>
